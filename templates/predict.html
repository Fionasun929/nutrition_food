<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>未来7天营养预测</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📈 未来7天营养摄入预测</h1>
        <p>基于 Holt-Winters 时间序列预测模型</p>
    </div>

    <!-- 未来7天摄入量预测 -->
    <div class="card">
        <div class="title">📊 未来7天营养摄入量预测</div>
        <div class="tip" id="tip1">需录入7天完整食谱以获得准确预测</div>
        <div class="grid">
            <div class="chart-item"><h4>热量 (kcal)</h4><div id="c1" class="chart"></div></div>
            
            <!-- 显示用户每日推荐摄入量 -->
            <div class="chart-item">
                <div class="actual-card">
                    <div class="actual-title">🎯 每日推荐摄入量</div>
                    <div class="actual-item">热量：<span class="actual-value" id="tgt_energy">0</span> kcal</div>
                    <div class="actual-item">蛋白质：<span class="actual-value" id="tgt_pro">0</span> g</div>
                    <div class="actual-item">脂肪：<span class="actual-value" id="tgt_fat">0</span> g</div>
                    <div class="actual-item">碳水：<span class="actual-value" id="tgt_carbs">0</span> g</div>
                    <div class="actual-item">钠：<span class="actual-value" id="tgt_sodium">0</span> mg</div>
                </div>
            </div>
            
            <div class="chart-item"><h4>蛋白质 (g)</h4><div id="c2" class="chart"></div></div>
            <div class="chart-item"><h4>脂肪 (g)</h4><div id="c3" class="chart"></div></div>
            <div class="chart-item"><h4>碳水 (g)</h4><div id="c4" class="chart"></div></div>
            <div class="chart-item"><h4>钠 (mg)</h4><div id="c5" class="chart"></div></div>
        </div>
    </div>

    <!-- 营养缺口合并为一张图 -->
    <div class="card">
        <div class="title">📉 营养缺口综合对比（标准值 - 预测均值）</div>
        <div id="gapChart" class="gap-chart"></div>
    </div>

    <div class="text-center">
        <a href="/index" class="btn">返回首页</a>
    </div>
</div>

<script>
// 初始化预测图表
const charts = [];
for(let i=1;i<=5;i++) charts.push(echarts.init(document.getElementById('c'+i)));
// 初始化缺口合并图表
const gapChart = echarts.init(document.getElementById('gapChart'));

function clearAll(){
    charts.forEach(c => c.clear());
    gapChart.clear();
}

window.onload = async function () {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) {
        alert("请先登录");
        location.href = "/login";
        return;
    }
    clearAll();

    try {
        const resp = await fetch("/predict_nutrition", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: user.userId })
        });
        const data = await resp.json();
        console.log("接口数据：", data);

        // 显示推荐摄入量
        document.getElementById('tgt_energy').innerText = (data.target_energy || 0).toFixed(0);
        document.getElementById('tgt_pro').innerText = (data.target_protein || 0).toFixed(1);
        document.getElementById('tgt_fat').innerText = (data.target_fat || 0).toFixed(1);
        document.getElementById('tgt_carbs').innerText = (data.target_carbs || 0).toFixed(1);
        document.getElementById('tgt_sodium').innerText = (data.target_sodium || 0).toFixed(0);

        if (data.status === "no_data") {
            charts[0].setOption({
                graphic: [{
                    type: "text",
                    left: "center",
                    top: "50%",
                    style: {
                        text: "请先录入食材",
                        fontSize: 26,
                        fontWeight: "bold",
                        fill: "#667eea"
                    }
                }]
            });
            return;
        }

        if (data.status === "partial") {
            document.getElementById('tip1').style.display = "block";
        }

        const colors = ['#667eea','#38a169','#f59e0b','#ec4899','#8b5cf6'];
        const seriesData = [data.energy, data.protein, data.fat, data.carbs, data.sodium];

        seriesData.forEach((d, i) => {
            charts[i].setOption({
                tooltip: { trigger: "axis" },
                grid: { left: 5, right: 5, top: 10, bottom: 10, containLabel: true },
                xAxis: { type: "category", data: data.days, axisLabel: { fontSize: 9 } },
                yAxis: { type: "value", axisLabel: { fontSize: 10 } },
                series: [{
                    type: "bar",
                    data: d,
                    itemStyle: { color: colors[i] },
                    barWidth: "45%"
                }]
            });
        });

        // 营养缺口：百分比显示 + 悬停显示原值
        const gapData = [
            { val: data.gap_energy, std: data.target_energy },
            { val: data.gap_protein, std: data.target_protein },
            { val: data.gap_fat, std: data.target_fat },
            { val: data.gap_carbs, std: data.target_carbs },
            { val: data.gap_sodium, std: data.target_sodium }
        ];

        const gapNames = ['热量缺口','蛋白质缺口','脂肪缺口','碳水缺口','钠缺口'];

        gapChart.setOption({
            tooltip: { 
                trigger: "axis",
                formatter: (params) => {
                    const rawVal = params[0].data.rawValue;
                    return `${params[0].name}<br/>缺口值：${rawVal.toFixed(2)}`;
                }
            },
            legend: { data: gapNames, top: 5 },
            grid: { left: "10%", right: "10%", bottom: "15%", top: "15%" },
            xAxis: {
                type: "category",
                data: gapNames,
                axisLabel: { interval: 0 }
            },
            yAxis: { 
                type: "value",
                axisLabel: {
                    formatter: (value) => `${(value * 100).toFixed(0)}%`
                }
            },
            series: [{
                type: "bar",
                data: gapData.map((item, idx) => {
                    const percent = item.std <= 0 ? 0 : (item.val / item.std);
                    return {
                        value: percent,
                        rawValue: item.val,
                        itemStyle: { color: item.val >= 0 ? "#4299e1" : "#f56565" }
                    };
                }),
                label: {
                    show: true,
                    position: "top",
                    formatter: (params) => {
                        const pct = (params.data.value * 100).toFixed(1);
                        return `${pct}%`;
                    }
                }
            }]
        });

    } catch (err) {
        console.error(err);
        charts[0].setOption({
            graphic: [{
                type: "text",
                left: "center",
                top: "50%",
                style: { text: "加载失败", fontSize: 22, fill: "#999" }
            }]
        });
    }
};
</script>
</body>
</html>
