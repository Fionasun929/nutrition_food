<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>当日营养分析报告</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header"><h1>📄 当日营养分析报告</h1></div>

    <div class="card">
        <h2>⚖️ 耦合协调度评价</h2>
        <div class="grid-2">
            <div><div class="label">耦合度 C</div><div class="value" id="C">--</div></div>
            <div><div class="label">综合指数 T</div><div class="value" id="T">--</div></div>
            <div><div class="label">协调度 D</div><div class="value" id="D">--</div></div>
            <div><div class="label">评价结果</div><div class="value" id="judge">--</div></div>
        </div>
    </div>

    <div class="card">
        <h2>⭐ 膳食健康评分</h2>
        <div style="text-align:center">
            <div style="font-size:60px;font-weight:bold;color:#667eea" id="score">--</div>
            <div style="font-size:18px;color:#666;margin-top:10px" id="scoreText">--</div>
        </div>
    </div>

    <div class="card">
        <h2>📊 当日营养素摄入详情</h2>
        <div id="nutriGrid" class="nutri-grid"></div>
        <button class="toggle-btn" id="toggleBtn">点击展开全部营养素</button>
    </div>

    <div class="card">
        <h2>🍽️ 今日食用食材清单</h2>
        <div id="foodList"></div>
    </div>

    <div class="card">
        <h2>💡 食用建议 & 禁忌</h2>
        <div id="suggestion"></div>
    </div>

    <div style="text-align:center">
        <button class="btn" onclick="showExportModal()">📤 导出报告</button>
        <a href="index.html" class="btn btn-outline">返回首页</a>
        <a href="history.html" class="btn btn-outline">历史数据</a>
        <a href="input.html" class="btn btn-outline">继续录入</a>
    </div>
</div>

<div id="exportModal" style="display:none"></div>

<script>
const u = JSON.parse(localStorage.getItem('currentUser'));
if(!u)location.href='login.html';
const today = new Date().toLocaleDateString().replace(/\//g, '-');

const NUTRI_FIELDS = [
    "水分","能量","蛋白质","脂肪","碳水化合物",
    "不溶性膳食纤维","胆固醇","灰分","总维生素A","胡萝卜素",
    "视黄醇","硫胺素","核黄素","烟酸","维生素C","维生素E",
    "钙","磷","钾","钠","镁","铁","锌","硒","铜","锰"
];

const DEFAULT_EXPORT = ["能量","蛋白质","脂肪","碳水化合物","钠"];
let totalNutriData = {};

function cleanNutriValue(val) {
    if (val === null || val === undefined) return 0;
    let s = String(val).trim();
    const invalid = ["-", "", "NA", "无", "微量", "nan", "NaN", "—"];
    if (invalid.includes(s)) return 0;
    const m = s.match(/(\d+\.?\d*)/);
    return m ? parseFloat(m[1]) : 0;
}

function parseFoodNutri(str) {
    try { return JSON.parse(str.trim().replace(/\n/g,"")); }
    catch(e){ return {}; }
}

function calculateTotalNutrition(foods) {
    const total = {};
    NUTRI_FIELDS.forEach(f => total[f] = 0);
    foods.forEach(item => {
        const j = parseFoodNutri(item.data_json);
        const r = cleanNutriValue(item.weight)/100;
        NUTRI_FIELDS.forEach(f => total[f] += cleanNutriValue(j[f])*r);
    });
    return total;
}

// 原版官方建议
function getOfficialDietAdvice(d, target) {
    let sug = []; let taboo = []; let tgt = target;
    if (d.energy < tgt.energy * 0.8) {
        sug.push("能量偏低，按膳食指南增加全谷物、奶类、大豆、适量鱼禽蛋瘦肉，两餐间可加酸奶、原味坚果加餐");
    } else if (d.energy > tgt.energy * 1.2) {
        sug.push("能量偏高，控制总食量，减少油炸、含糖饮料、糕点，增加蔬菜，保持吃动平衡");
        taboo.push("避免油炸食品、肥肉、奶油蛋糕、含糖饮料、夜宵过量");
    } else { sug.push("能量摄入适宜，继续保持规律进餐、足量运动的健康模式"); }

    if (d.protein < tgt.protein * 0.8) {
        sug.push("蛋白质不足，优先选择鱼、禽、蛋、瘦肉、大豆制品；每天1个鸡蛋，不弃蛋黄；每周至少2次水产品");
    } else if (d.protein > tgt.protein * 1.5) {
        sug.push("蛋白质偏高，适当减少红肉，避免长期过量增加代谢负担");
        taboo.push("少吃烟熏、腌制、深加工肉制品，避免肥肉过量");
    } else { sug.push("蛋白质摄入合理，保持动植物蛋白搭配，符合膳食指南要求"); }

    if (d.carbs < tgt.carbs * 0.8) {
        sug.push("碳水不足，主食以谷类为主，增加全谷物、杂豆、薯类，做到粗细搭配");
    } else if (d.carbs > tgt.carbs * 1.2) {
        sug.push("碳水偏高，减少精制米面，用全谷物替代一半主食，控制添加糖");
        taboo.push("少喝含糖饮料，少吃糕点、糖果、白粥、精制面点");
    } else { sug.push("碳水摄入合理，供能比在50%–65%官方推荐范围"); }

    if (d.fat < tgt.fat * 0.7) {
        sug.push("脂肪偏低，适量用橄榄油、菜籽油等植物油，每天吃一小把原味坚果，每周2–3次深海鱼");
    } else if (d.fat > tgt.fat * 1.3) {
        sug.push("脂肪偏高，烹调用油控制在25–30g/天，少油炸、少红烧");
        taboo.push("避免动物油、肥肉、油炸食品、薯片、人造奶油、反式脂肪食物");
    } else { sug.push("脂肪摄入合理，供能比在20%–30%官方推荐范围"); }

    if (d.sodium > tgt.sodium * 1.1) {
        sug.push("钠偏高，食盐≤5g/天，少酱油、蚝油、咸菜；烹饪用葱蒜醋提味，出锅再放盐");
        taboo.push("禁咸菜、榨菜、腐乳、腌肉、火腿、方便面、咸味零食，少吃外卖快餐");
    } else if (d.sodium < tgt.sodium * 0.5) {
        sug.push("钠偏低，可适量摄入海带、紫菜等天然含钠食物，维持电解质平衡");
    } else { sug.push("钠摄入适宜，符合清淡饮食、少盐限钠官方要求"); }

    sug.push("餐餐有蔬菜，每天300–500g，深色蔬菜占1/2以上");
    sug.push("天天吃水果，每天200–350g，果汁不能替代鲜果");
    sug.push("每天喝奶300ml以上，常吃大豆及坚果类25–35g");
    sug.push("足量饮水1500–1700ml，喝白开水或淡茶水，不喝含糖饮料");
    sug.push("三餐定时定量，不暴饮暴食，晚餐不宜过晚");
    sug.push("每周至少5天中等强度身体活动，主动身体活动6000步");

    return { sug, taboo };
}

// 随机5条
function getRandom5(arr) {
    return arr.sort(() => 0.5 - Math.random()).slice(0, 5);
}

// 折叠
function initToggle() {
    const btn = document.getElementById("toggleBtn");
    let expanded = false;
    btn.onclick = () => {
        expanded = !expanded;
        document.querySelectorAll(".nutri-item").forEach((it, i) => {
            if (i >= 6) it.classList.toggle("hidden", !expanded);
        });
        btn.innerText = expanded ? "点击收起全部营养素" : "点击展开全部营养素";
    };
}

// 导出弹窗
function showExportModal() {
    if (!window.reportData) { alert("暂无数据可导出"); return; }
    let opts = "";
    NUTRI_FIELDS.forEach(f => {
        const checked = DEFAULT_EXPORT.includes(f) ? "checked" : "";
        opts += `<div class="option-item"><input type="checkbox" value="${f}" id="opt_${f}" ${checked}> <label for="opt_${f}">${f}</label></div>`;
    });

    document.getElementById("exportModal").innerHTML = `
    <div class="modal">
      <div class="modal-box">
        <div class="modal-title">选择导出营养素</div>
        <div class="btn-group">
          <button class="select-all-btn" onclick="checkAll(true)">全选</button>
          <button class="select-all-btn" onclick="checkAll(false)">取消全选</button>
        </div>
        <div class="option-grid">${opts}</div>
        <div class="modal-buttons">
          <button class="modal-btn btn-cancel" onclick="closeModal()">取消</button>
          <button class="modal-btn btn-confirm" onclick="doExport()">确认导出</button>
        </div>
      </div>
    </div>`;
    document.getElementById("exportModal").style.display = "block";
}

function checkAll(flag) {
    NUTRI_FIELDS.forEach(f => {
        const el = document.getElementById(`opt_${f}`);
        if (el) el.checked = flag;
    });
}

function closeModal() {
    document.getElementById("exportModal").style.display = "none";
}

function doExport() {
    const checked = NUTRI_FIELDS.filter(f => document.getElementById(`opt_${f}`)?.checked);
    closeModal();
    const d = window.reportData;
    const foods = window.foodList || [];

    let content = `# 营养分析报告
用户：${u.username}
时间：${new Date().toLocaleString()}

【耦合评价】
耦合度 C：${d.C || 0}
综合指数 T：${d.T || 0}
协调度 D：${d.D || 0}
评价：${d.judge || "暂无"}

【健康评分】${d.score || 0}分

【导出营养素】
`;
    checked.forEach(f => content += `${f}：${totalNutriData[f].toFixed(2)}\n`);
    content += "\n【今日食材】\n";
    foods.forEach((it, i) => content += `${i + 1}、${it.name} ${it.weight}g  [${it.meal || ''}]\n`);

    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `营养报告_${today}.txt`;
    a.click();
    alert("导出成功！");
}

// 页面加载
async function loadReport() {
    try {
        const foodsRes = await fetch('/get_user_foods', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: u.userId, date: today })
        });
        const foods = (await foodsRes.json()).data || [];

        const nutriRes = await fetch('/get_total_nutri', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ foods, user_id: u.userId })
        });
        const d = await nutriRes.json();
        window.reportData = d;
        window.foodList = foods;
        totalNutriData = calculateTotalNutrition(foods);

        document.getElementById('C').innerText = d.C || 0;
        document.getElementById('T').innerText = d.T || 0;
        document.getElementById('D').innerText = d.D || 0;
        document.getElementById('judge').innerText = d.judge || '暂无';
        document.getElementById('score').innerText = d.score || 0;
        document.getElementById('scoreText').innerText = d.score >= 80 ? '优秀' : d.score >= 60 ? '合格' : '需改善';

        // 营养素
        const g = document.getElementById('nutriGrid');
        NUTRI_FIELDS.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = `nutri-item ${i > 5 ? 'hidden' : ''}`;
            div.innerText = `${f}：${totalNutriData[f].toFixed(2)}`;
            g.appendChild(div);
        });

        // 食材 + 餐次
        const foodEl = document.getElementById('foodList');
        if (foods.length === 0) {
            foodEl.innerHTML = "<div class='food-item'>暂无食材记录</div>";
        } else {
            foodEl.innerHTML = foods.map((it, i) => `
                <div class="food-item">
                    <span>${i + 1}、${it.name}　${it.weight}g</span>
                    <span class="food-meal">${it.meal || ''}</span>
                </div>
            `).join('');
        }

        // 建议 & 禁忌
        const { sug, taboo } = getOfficialDietAdvice(d, {
            energy: d.target_energy, protein: d.target_protein,
            fat: d.target_fat, carbs: d.target_carbs, sodium: d.target_sodium
        });
        const randSug = getRandom5(sug);
        
        let html = '';
        randSug.forEach(s => {
            html += `<div class="suggest-item">✅ ${s}</div>`;
        });
        if (taboo.length) {
            html += `<div style="height:8px"></div>`;
            taboo.forEach(t => {
                html += `<div class="taboo-item">❌ ${t}</div>`;
            });
        }
        document.getElementById('suggestion').innerHTML = html;

        initToggle();
    } catch (e) {
        console.error(e);
        alert('加载失败：' + e.message);
    }
}

loadReport();
</script>
</body>
</html>
